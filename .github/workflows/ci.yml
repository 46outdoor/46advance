name: CI

# The workflow runs on every PR/push so the required `CI Summary` check always
# reports. The expensive jobs are gated behind `changes` and skip on doc-only
# changes (`**.md`, `docs/**`, `planning/**`); `CI Summary` treats skipped gate
# jobs as a pass so doc-only PRs satisfy branch protection without running CI.
# (Do NOT add `paths-ignore` here — it suppresses the whole workflow, so the
# required check never reports and doc-only PRs become unmergeable.)
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN (WS-K): CI only reads the repo; paths-filter reads changed files on PRs.
permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect whether anything outside docs/planning changed. `code == 'true'` gates the
  # expensive jobs below, so doc-only PRs (`**.md`, `docs/**`, `planning/**`) skip them.
  # `predicate-quantifier: every` makes a changed file count as code only if it matches
  # ALL the negations (i.e. is none of those doc paths) — so doc-only diffs resolve false,
  # while any real code file flips it true.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'
              - '!planning/**'

  quality:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npm run lint -- --max-warnings 0
      # Formatting is gated (WS-M): .prettierignore scopes it to intentional source/config
      # so this checks real files only, not generated output.
      - run: npm run format:check
      - run: npm run typecheck
      # `tsc -b` covers src + vite/vitest configs only; type-check the Playwright
      # specs and emulator harness (tests/) separately so they can't rot (WS-J).
      - run: npm run typecheck:tests
      - run: npm run arch:check
      - run: npm run deadcode

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npm run test:coverage

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npm run build

  rules-tests:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Firestore emulator
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}
      - run: npm ci
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14.27.0
      - run: npm run test:rules

  functions:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa/functions
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/functions/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Deploy build excludes tests; typecheck them separately so type errors in
      # specs and the emulator harness can't rot undetected (WS-J).
      - run: npm run typecheck:tests
      - run: npm run test
      - run: npm run build

  # Callable handler tests (firebase-functions-test) against the Auth + Firestore
  # emulators — same emulator setup as rules-tests, but for functions/src handlers.
  functions-emulator:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa/functions
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/functions/package-lock.json
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Firestore emulator
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}
      - run: npm ci
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14.27.0
      - run: npm run test:emulator

  # Authenticated critical-path smoke: real sign-in flows in Chromium against the
  # Auth + Firestore + Storage emulators (deterministic personas seeded via REST).
  # Kept small and stable — the slower cross-browser / a11y / offline suites stay
  # separately triggerable until they're stable enough to gate (WS-J).
  e2e-emulator:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    # firebase-safe.sh overrides XDG_CACHE_HOME for emulators:exec, which on Linux is
    # where Playwright looks for its browsers — pin an explicit path so the install step
    # and the emulator-wrapped test run agree on one location regardless of XDG.
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Firestore emulator
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}
      - run: npm ci
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14.27.0
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:emulator

  # Required status check for branch protection on `main`. Always runs so the
  # check reports on every PR (incl. doc-only). Passes when each gate job either
  # succeeded or was skipped (doc-only change); fails if any gate job failed or
  # change detection itself failed.
  ci-summary:
    name: CI Summary
    needs: [changes, quality, test, build, rules-tests, functions, functions-emulator, e2e-emulator]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify gate jobs passed (or were skipped on doc-only changes)
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detection failed."
            exit 1
          fi
          ok=true
          for entry in \
            "quality:${{ needs.quality.result }}" \
            "test:${{ needs.test.result }}" \
            "build:${{ needs.build.result }}" \
            "rules-tests:${{ needs.rules-tests.result }}" \
            "functions:${{ needs.functions.result }}" \
            "functions-emulator:${{ needs.functions-emulator.result }}" \
            "e2e-emulator:${{ needs.e2e-emulator.result }}"; do
            name="${entry%%:*}"; res="${entry##*:}"
            if [ "$res" != "success" ] && [ "$res" != "skipped" ]; then
              echo "::error::Gate job '$name' resulted in: $res"
              ok=false
            fi
          done
          if [ "$ok" != "true" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          if [ "${{ needs.changes.outputs.code }}" == "true" ]; then
            echo "All CI gate jobs passed."
          else
            echo "Doc-only change — gate jobs skipped; CI Summary passes."
          fi
