name: CI

# The workflow runs on every PR/push so the required `CI Summary` check always
# reports. The expensive jobs are gated behind `changes` and skip on doc-only
# changes (`**.md`, `docs/**`, `planning/**`); `CI Summary` treats skipped gate
# jobs as a pass so doc-only PRs satisfy branch protection without running CI.
# (Do NOT add `paths-ignore` here — it suppresses the whole workflow, so the
# required check never reports and doc-only PRs become unmergeable.)
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether anything outside docs/planning changed. `code == 'true'` gates the
  # expensive jobs below, so doc-only PRs (`**.md`, `docs/**`, `planning/**`) skip them.
  # `predicate-quantifier: every` makes a changed file count as code only if it matches
  # ALL the negations (i.e. is none of those doc paths) — so doc-only diffs resolve false,
  # while any real code file flips it true.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'
              - '!planning/**'

  quality:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npm run lint -- --max-warnings 0
      - run: npm run typecheck
      - run: npm run arch:check
      - run: npm run deadcode

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npm run test:coverage

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npm run build

  rules-tests:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Cache Firestore emulator
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}
      - run: npm ci
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14
      - run: npm run test:rules

  functions:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pwa/functions/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  # Required status check for branch protection on `main`. Always runs so the
  # check reports on every PR (incl. doc-only). Passes when each gate job either
  # succeeded or was skipped (doc-only change); fails if any gate job failed or
  # change detection itself failed.
  ci-summary:
    name: CI Summary
    needs: [changes, quality, test, build, rules-tests, functions]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify gate jobs passed (or were skipped on doc-only changes)
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detection failed."
            exit 1
          fi
          ok=true
          for entry in \
            "quality:${{ needs.quality.result }}" \
            "test:${{ needs.test.result }}" \
            "build:${{ needs.build.result }}" \
            "rules-tests:${{ needs.rules-tests.result }}" \
            "functions:${{ needs.functions.result }}"; do
            name="${entry%%:*}"; res="${entry##*:}"
            if [ "$res" != "success" ] && [ "$res" != "skipped" ]; then
              echo "::error::Gate job '$name' resulted in: $res"
              ok=false
            fi
          done
          if [ "$ok" != "true" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          if [ "${{ needs.changes.outputs.code }}" == "true" ]; then
            echo "All CI gate jobs passed."
          else
            echo "Doc-only change — gate jobs skipped; CI Summary passes."
          fi
