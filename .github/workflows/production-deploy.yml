name: Production Deployment

# Hosting is deployed ONLY through this manual workflow (never agent/local).
# It deploys whatever is on `main`, so merge first.
on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Type "deploy" to confirm a production hosting deploy'
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

defaults:
  run:
    working-directory: pwa

# Least-privilege GITHUB_TOKEN (WS-K): the deploy reads the repo and writes a deploy check-run status.
# The Firebase deploy itself authenticates with FIREBASE_SERVICE_ACCOUNT, not GITHUB_TOKEN.
permissions:
  contents: read
  checks: write

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm_deploy == 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Pinned: Node 22.23.0 (a security release) regressed keep-alive socket
          # reuse, causing false "Premature close" errors in google-auth-library's
          # OAuth2 token fetch — which breaks the firebase-tools hosting deploy
          # ~100% of the time (nodejs/node#63989). 22.22.3 is the last known-good
          # release (deploys on it succeeded). Unpin once a fixed 22.x ships.
          node-version: 22.22.3
          cache: npm
          cache-dependency-path: pwa/package-lock.json
      - run: npm ci
      - run: npm run lint -- --max-warnings 0
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_PICKER_API_KEY: ${{ secrets.VITE_GOOGLE_PICKER_API_KEY }}
          # Observability (WS-I). Inert until VITE_SENTRY_DSN is set; source-map upload runs only
          # when SENTRY_AUTH_TOKEN is also set (org/project below are public, non-secret slugs).
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_RELEASE: ${{ github.sha }}
          SENTRY_ORG: 46-advance
          SENTRY_PROJECT: javascript-react
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # App Check (WS-I): reCAPTCHA v3 site key. Inert until set; enforcement is enabled in the
          # Firebase console separately, so this can't lock anyone out before it's deliberately on.
          VITE_APPCHECK_SITE_KEY: ${{ secrets.VITE_APPCHECK_SITE_KEY }}
      # Firebase's OAuth token endpoint intermittently returns a transient
      # "Premature close" during service-account auth, failing the deploy even
      # though the credential is valid (history shows ~1-in-4 runs flaking, with
      # immediate re-runs succeeding). The action's own retry fires ~1s later —
      # too fast to clear a multi-minute blip — so we add delayed retries: three
      # attempts at 0s / +60s / +120s. firebaseToolsVersion is pinned to match the
      # rules-tests job (firebase-tools@14) so a bad `latest` can't slip in here.
      # The `with:` block is repeated per attempt because GitHub Actions does not
      # support YAML anchors. Only the final attempt is allowed to fail the job.
      - name: Deploy to Firebase Hosting (live) — attempt 1
        id: deploy1
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: advancethat
          channelId: live
          entryPoint: pwa
          firebaseToolsVersion: "14.27.0"
      - name: Back off before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 60
      - name: Deploy to Firebase Hosting (live) — attempt 2
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: advancethat
          channelId: live
          entryPoint: pwa
          firebaseToolsVersion: "14.27.0"
      - name: Back off before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 120
      - name: Deploy to Firebase Hosting (live) — attempt 3 (final)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a # v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: advancethat
          channelId: live
          entryPoint: pwa
          firebaseToolsVersion: "14.27.0"
      # Runtime smoke check (WS-I): confirm the live site serves the app shell + assets + security
      # headers. Runs only if some deploy attempt succeeded; a failure fails the job (visible), so a
      # broken release doesn't silently go live.
      - name: Post-deploy runtime smoke
        if: steps.deploy1.outcome == 'success' || steps.deploy2.outcome == 'success' || steps.deploy3.outcome == 'success'
        run: ./scripts/cli/post-deploy-smoke.sh https://advancethat.web.app
# TODO(Phase 0/U): set repo secrets VITE_FIREBASE_* + FIREBASE_SERVICE_ACCOUNT before first run.
# Phase 13: also set VITE_GOOGLE_PICKER_API_KEY (Google Picker API key) so Drive attach works in prod.
# WS-I observability (optional): add repo secret VITE_SENTRY_DSN to turn on Sentry error events, and
# SENTRY_AUTH_TOKEN to upload source maps for readable stacks. Until VITE_SENTRY_DSN is set, Sentry is
# a no-op; until SENTRY_AUTH_TOKEN is set, source maps aren't uploaded — the build is unaffected either
# way. See pwa/guides/OBSERVABILITY.md.
