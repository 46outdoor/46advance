# Minor/patch updates are grouped and auto-proposed monthly. Majors are ignored here because they
# usually need code changes — but "ignored" must NOT mean "forgotten" (WS-K). Deliberate MAJOR
# evaluation is a scheduled manual review each quarter for the load-bearing deps:
#   firebase, firebase-admin, googleapis, google-auth-library, vite, react/react-dom, @sentry/*,
#   firebase-tools (CI/deploy). Bump one deliberately, run the full gate set, and record it.
version: 2
updates:
  - package-ecosystem: npm
    directory: /pwa
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      pwa-minor-patch:
        update-types: [minor, patch]
    ignore:
      # Handle major upgrades manually (they often need code changes).
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: npm
    directory: /pwa/functions
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      functions-minor-patch:
        update-types: [minor, patch]
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        update-types: [minor, patch]
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
